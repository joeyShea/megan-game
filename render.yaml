services:

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  - type: web
    name: megan-game-backend
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      # Tells the backend which origin to allow for CORS.
      # Update this if you rename the frontend service.
      - key: ALLOWED_ORIGINS
        value: https://megan-game-frontend.onrender.com

  # ── React / Vite frontend (static site) ────────────────────────────────────
  - type: web
    name: megan-game-frontend
    env: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      # Points the frontend at the live backend.
      # Must match the backend service name above.
      - key: VITE_BACKEND_URL
        value: https://megan-game-backend.onrender.com
    routes:
      # SPA fallback — all paths serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      # Cache hashed Vite assets forever; browsers re-fetch when hash changes
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
